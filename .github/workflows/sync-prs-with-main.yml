name: Sync open PRs with main

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync branches for open PRs targeting main
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'main',
              per_page: 100,
            });

            core.info(`Found ${pulls.length} open PR(s) targeting main.`);

            for (const pr of pulls) {
              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number,
                });

                core.info(`Queued branch update for #${pr.number} (${pr.title}).`);
              } catch (error) {
                core.warning(`Could not update #${pr.number}: ${error.message}`);
              }
            }
