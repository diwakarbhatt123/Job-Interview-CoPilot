name: Sync open PRs with main

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sync-open-prs-with-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync branches for open PRs targeting main
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'main',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            });

            core.info(`Found ${pulls.length} open PR(s) targeting main.`);

            for (const pr of pulls) {
              if (pr.draft) {
                core.info(`Skipping draft PR #${pr.number}.`);
                continue;
              }

              if (pr.head.repo?.full_name !== `${owner}/${repo}`) {
                core.info(`Skipping fork PR #${pr.number}; branch update is not supported from this workflow token.`);
                continue;
              }

              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number,
                  expected_head_sha: pr.head.sha,
                });

                core.info(`Queued branch update for #${pr.number} (${pr.title}).`);
              } catch (error) {
                const status = error?.status ? ` (HTTP ${error.status})` : '';
                core.warning(`Could not update #${pr.number}${status}: ${error.message}`);
              }
            }
